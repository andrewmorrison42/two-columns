<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2B363D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Two Columns" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Two Columns</title>
  <style>
    html, body { margin: 0; padding: 0; background: #2B363D; }
    #root { min-height: 100vh; }
    .boot { font-family: -apple-system, system-ui, sans-serif; color: #8A989E; text-align: center; padding-top: 42vh; }
  </style>
</head>
<body>
  <div id="root"><div class="boot">A moment…</div></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script>
    (function () {
      function boot(source) {
        try {
          var transformed = Babel.transform(source, {
            presets: [["react", { runtime: "classic" }]],
          }).code;
          (0, eval)(transformed);
        } catch (e) {
          document.getElementById("root").innerHTML =
            '<div class="boot">Something went wrong starting the app.<br>Try reloading. (' +
            (e && e.message ? e.message : e) + ")</div>";
          console.error(e);
        }
      }
      fetch("app.js")
        .then(function (r) { return r.text(); })
        .then(boot)
        .catch(function (e) {
          document.getElementById("root").innerHTML =
            '<div class="boot">Couldn\'t load the app. Check your connection for the first load.</div>';
          console.error(e);
        });
    })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) {
          console.warn("SW registration failed:", e);
        });
      });
    }
  </script>
</body>
</html>
